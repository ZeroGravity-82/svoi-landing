<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>СВОИ — просто быть ближе</title>

  <meta name="description" content="СВОИ — семейная платформа, которая помогает сохранять связь, истории и заботу поколений.">
  <meta name="robots" content="noindex,nofollow">

  <style>
    :root {
      --bg: #f8f3ec;
      --text: #2f2924;
      --muted: #74695f;
      --accent: #8b5e3c;
      --card: #fffaf3;
      --border: rgba(47, 41, 36, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(234, 216, 196, 0.7), transparent 30rem),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .wrap {
      width: min(820px, 100%);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--border);
      border-radius: 36px;
      background: rgba(255, 250, 243, 0.78);
      box-shadow: 0 24px 80px rgba(55, 38, 24, 0.10);
      backdrop-filter: blur(16px);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 14px;
      background: rgba(255, 250, 243, 0.8);
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      margin: 30px 0 0;
      font-size: clamp(64px, 12vw, 124px);
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 780;
    }

    .tagline {
      margin: 24px 0 0;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.04;
      letter-spacing: -0.045em;
      font-weight: 720;
    }

    .lead {
      margin: 28px 0 0;
      max-width: 680px;
      font-size: clamp(18px, 2.2vw, 23px);
      line-height: 1.55;
      color: var(--muted);
    }

    .idea {
      margin-top: 30px;
      padding: 22px;
      border-radius: 24px;
      background: #ead8c4;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.45;
      font-weight: 650;
    }

    .footer {
      margin-top: 36px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="status">Проект готовится к запуску</div>

    <h1>СВОИ</h1>

    <div class="tagline">Просто быть ближе.</div>

    <p class="lead">
      Семейная платформа, которая помогает сохранять связь,
      истории и заботу поколений.
    </p>

    <div class="idea">
      Мы создаем пространство для семейных историй,
      важных дат, фотографий и связи между близкими.
    </div>

    <div class="footer">
      <div>© 2026 СВОИ</div>
      <div>svoi.family</div>
    </div>
  </main>
</body>
</html>
